<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ons verhaal · Ilja & Jeroen</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:radial-gradient(circle at 50% -10%, #23445a 0%, #16323f 70%, #0d2028 100%);
    font-family:"Courier New",Courier,monospace;color:#f5ead6;
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
  .frame{width:100%;max-width:860px;text-align:center;}
  h1{font-size:clamp(18px,4.5vw,28px);letter-spacing:2px;text-shadow:2px 2px 0 #0d2028;margin-bottom:10px;}
  .stage{position:relative;width:100%;border:4px solid #0d2028;border-radius:10px;overflow:hidden;
    box-shadow:0 10px 0 rgba(0,0,0,.3), inset 0 0 0 2px rgba(255,255,255,.12);background:#111;}
  canvas{display:block;width:100%;height:auto;image-rendering:pixelated;}
  .card{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:18px;
    background:rgba(22,50,63,.55);opacity:0;pointer-events:none;transition:opacity 1.2s ease;}
  .card.show{opacity:1;pointer-events:auto;}
  .cardInner{background:#f5ead6;color:#16323f;border:4px solid #16323f;border-radius:8px;padding:18px 20px;
    max-width:400px;box-shadow:0 6px 0 rgba(0,0,0,.3);}
  .cardInner h2{font-size:clamp(20px,5.5vw,30px);color:#e8785b;margin-bottom:2px;}
  .cardInner .amp{color:#3b7ea1;}
  .cardInner .lbl{letter-spacing:2px;font-size:12px;margin-bottom:6px;}
  .cardInner .date{font-size:clamp(24px,7vw,42px);font-weight:bold;letter-spacing:2px;color:#16323f;margin:6px 0 4px;}
  .cardInner .venue{font-size:clamp(13px,3vw,17px);font-weight:bold;letter-spacing:1px;}
  .cardInner .place{font-size:11px;opacity:.8;margin-top:2px;}
  .cardInner .foot{font-size:11px;margin-top:12px;opacity:.85;font-style:italic;}
  .btn{margin-top:14px;background:#e8785b;color:#fdf8ee;border:3px solid #16323f;border-radius:6px;padding:9px 18px;
    font-family:inherit;font-weight:bold;font-size:13px;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 0 #16323f;}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #16323f;}
  .hint{margin-top:12px;font-size:11px;color:#bcd7e2;letter-spacing:1px;opacity:.8;}
</style>
</head>
<body>
<div class="frame">
  <h1>ILJA <span style="color:#e8785b">♥</span> JEROEN</h1>
  <div class="stage">
    <canvas id="c" width="480" height="270"></canvas>
    <div class="card" id="card">
      <div class="cardInner">
        <h2>Save the Date</h2>
        <div class="lbl">wij gaan trouwen</div>
        <div class="date">23.04.27</div>
        <div class="venue">Restaurant Ferry Amsterdam</div>
        <div class="foot">Houd deze datum vrij — uitnodiging volgt! ⛴️♥</div>
        <button class="btn" id="replay">↻ Opnieuw afspelen</button>
      </div>
    </div>
  </div>
</div>

<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height; ctx.imageSmoothingEnabled=false;
const card=document.getElementById('card');

/* ---------- helpers ---------- */
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,Math.max(0,w)|0,Math.max(0,h)|0); }
function disc(cx,cy,r,c){ for(let dy=-r;dy<=r;dy++){ const hw=Math.round(Math.sqrt(Math.max(0,r*r-dy*dy))); px(cx-hw,cy+dy,hw*2,1,c);} }
function hx(h){h=h.replace('#','');if(h.length===3)h=[...h].map(c=>c+c).join('');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function mix(a,b,t){const A=hx(a),B=hx(b);return 'rgb('+A.map((v,i)=>Math.round(v+(B[i]-v)*t)).join(',')+')';}
function clamp01(v){return v<0?0:v>1?1:v;}

/* ---------- timeline (ms) ---------- */
const S1=[0,5200];        // outback drive
const S2=[5200,12600];    // proposal
const S3=[12600,16600];   // drive to ferry ("En nu is het zover!")
const S4=[16600,23400];   // guests arriving at the Ferry ("Kom je ook?")
const CARD=23400;
let start=performance.now();
let heartsP=[], confetti=[], cardShown=false;

/* ---------- backgrounds ---------- */
function skyOutback(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#ffd9a0'); g.addColorStop(.55,'#ffb27a'); g.addColorStop(1,'#e98a5b'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
function skyWater(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#cdeaf5'); g.addColorStop(.6,'#9bd6e8'); g.addColorStop(1,'#7cc3da'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
function skyMix(t){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,mix('#ffd9a0','#cdeaf5',t)); g.addColorStop(.6,mix('#ffb27a','#9bd6e8',t)); g.addColorStop(1,mix('#e98a5b','#7cc3da',t)); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
function sun(x,y){ disc(x,y,16,'#fff3d0'); disc(x,y,12,'#ffe39a'); disc(x,y,9,'#ffd36b'); }
function clouds(off){ ctx.globalAlpha=.85; for(let i=0;i<3;i++){ const cx=((i*180 - off*0.3)%(W+120))-60, cy=40+i*14; px(cx,cy,34,8,'#fff'); px(cx+10,cy-6,22,8,'#fff'); px(cx+6,cy+6,30,5,'#f3f7fa'); } ctx.globalAlpha=1; }
function dunes(off,groundY){ px(0,groundY-10,W,H-groundY+10,'#d98a4e'); for(let x=-40;x<W+40;x+=80){ const bx=x-(off*0.15)%80; disc(bx+40,groundY+4,46,'#cf7d43'); }
  px(0,groundY,W,H-groundY,'#c56a30'); px(0,groundY+18,W,26,'#b25a28'); px(0,groundY+18,W,2,'#9c4c20');
  for(let x=-40;x<W+40;x+=48){ px((x-(off*1.0)%48),groundY+29,22,3,'#ffd9a0'); }
  for(let x=-30;x<W+30;x+=140){ const bx=(x-(off*1.0)%140); px(bx,groundY+52,12,5,'#8a4a22'); px(bx+3,groundY+49,6,4,'#7a8a3a'); } }
function quay(off,groundY,tt){ const wy=groundY+14; const g=ctx.createLinearGradient(0,wy,0,H); g.addColorStop(0,'#2b5f7c'); g.addColorStop(1,'#4f95b8'); ctx.fillStyle=g; ctx.fillRect(0,wy,W,H-wy);
  ctx.fillStyle='rgba(255,255,255,.10)'; for(let y=wy;y<H;y+=10){ for(let x=(Math.floor(y/10)%2?0:16);x<W;x+=32){ px(x,y+((tt*0.03)%10),8,2,'#ffffff22'); } }
  px(0,groundY,W,14,'#7d7466'); px(0,groundY,W,3,'#8f8676'); for(let x=-20;x<W+20;x+=28){ px((x-(off*1.0)%28),groundY,2,14,'#6a6255'); } }

/* ---------- camper ---------- */
function wheel(x,y,ang){ disc(x,y,7,'#1c1c1c'); disc(x,y,4,'#5a5a5a'); ctx.save(); ctx.translate(x,y); ctx.rotate(ang); px(-1,-6,2,12,'#8a8a8a'); px(-6,-1,12,2,'#8a8a8a'); ctx.restore(); disc(x,y,1,'#2a2a2a'); }
function camper(cx,baseY,tt,moving){ const bounce=moving?Math.sin(tt*0.02)*1.1:0, by=baseY+bounce;
  px(cx-34,baseY+8,70,3,'rgba(0,0,0,.18)'); const ang=tt*0.02; wheel(cx-20,baseY+5,moving?ang:0); wheel(cx+22,baseY+5,moving?ang:0);
  px(cx-35,by-16,72,14,'#e8785b'); px(cx-35,by-6,72,2,'#c85f45'); px(cx-35,by-30,70,16,'#f5ead6'); px(cx+34,by-27,4,12,'#f0e2c8'); px(cx-35,by-31,72,2,'#e6d6b6');
  px(cx-27,by-38,44,8,'#efe4cd'); px(cx-27,by-39,44,2,'#e0d2b4'); px(cx-24,by-42,40,3,'#ffcf5c'); px(cx-24,by-42,6,3,'#e8785b');
  px(cx-30,by-28,20,10,'#8fd0e6'); px(cx-8,by-28,18,10,'#8fd0e6'); px(cx+13,by-27,12,9,'#a7dcee'); px(cx-9,by-28,1,10,'#16323f'); px(cx+11,by-27,1,9,'#16323f');
  px(cx-24,by-25,5,5,'#f2caa0'); px(cx-24,by-27,5,2,'#c98a3f'); px(cx-3,by-25,5,5,'#f2caa0'); px(cx-3,by-27,5,2,'#5a3a22');
  px(cx-35,by-15,72,2,'#3b7ea1'); px(cx+36,by-13,2,3,'#ffcf5c'); px(cx-36,by-13,1,3,'#e8785b'); px(cx+2,by-30,1,14,'#d8c9a8'); }

/* ---------- proposal people ---------- */
function ilja(x,gy){ const skin='#f2caa0',hair='#5a3a22',shirt='#6b6f3f';
  px(x-5,gy-14,4,14,'#3a3a46'); px(x+1,gy-14,4,14,'#3a3a46'); px(x-6,gy-1,5,2,'#222'); px(x+1,gy-1,5,2,'#222');
  px(x-7,gy-30,14,17,shirt); px(x-9,gy-29,2,11,shirt); px(x+7,gy-28,2,9,shirt); px(x+8,gy-20,3,2,skin);
  px(x-2,gy-31,4,2,'#e0b184'); px(x-6,gy-44,12,12,skin); px(x-7,gy-46,14,5,hair); px(x-4,gy-47,8,2,'#6b4428'); px(x-8,gy-42,2,10,hair); px(x+6,gy-42,2,10,hair);
  px(x-3,gy-40,1,2,'#3f7a6a'); px(x+2,gy-40,1,2,'#3f7a6a'); px(x-2,gy-36,4,1,'#c9805f'); px(x-5,gy-37,2,1,'#f2b79a'); px(x+3,gy-37,2,1,'#f2b79a'); px(x+6,gy-39,1,2,'#ffcf5c'); }
function jeroen(x,gy,sparkleOn){ const skin='#f2caa0',shirt='#1b1b1b',curl='#c98a3f';
  px(x-7,gy-8,5,8,shirt); px(x-8,gy-1,6,2,'#222'); px(x-2,gy-15,11,4,shirt); px(x+7,gy-12,4,12,shirt); px(x+6,gy-1,6,2,'#222');
  px(x-7,gy-31,14,17,shirt); px(x-9,gy-29,2,11,shirt); px(x+6,gy-30,7,2,shirt); px(x+12,gy-33,2,4,shirt); px(x+13,gy-34,2,2,skin);
  px(x-2,gy-33,4,2,'#e0b184'); px(x-6,gy-46,12,12,skin); px(x-6,gy-38,12,2,'#c98f5f'); px(x-6,gy-42,1,4,'#c98f5f'); px(x+5,gy-42,1,4,'#c98f5f');
  px(x-3,gy-42,1,2,'#3b6ea1'); px(x+2,gy-42,1,2,'#3b6ea1'); px(x-2,gy-38,3,1,'#b96b4a'); px(x-6,gy-49,12,4,curl); px(x-7,gy-47,2,3,curl); px(x+5,gy-47,2,3,curl);
  px(x-4,gy-50,1,1,'#e0a95a'); px(x+2,gy-50,1,1,'#e0a95a'); px(x,gy-49,1,1,'#e0a95a'); px(x+13,gy-37,2,2,'#ffcf5c');
  if(sparkleOn){ px(x+13,gy-40,1,1,'#fff'); px(x+16,gy-38,1,1,'#fff'); px(x+12,gy-38,1,1,'#fff'); px(x+15,gy-41,1,1,'#fff'); } }

/* ---------- hearts + confetti + captions ---------- */
function heart(x,y,s,c){ px(x,y,s,s,c); px(x+s*2,y,s,s,c); px(x,y+s,s*3,s,c); px(x+s,y+s*2,s,s,c); }
function spawnHeart(x,y){ heartsP.push({x,y,vy:-0.5-Math.random()*0.6,vx:-0.4+Math.random()*0.8,life:70,s:2+(Math.random()*2|0)}); }
function updateHearts(){ for(const h of heartsP){h.x+=h.vx;h.y+=h.vy;h.life--;} heartsP=heartsP.filter(h=>h.life>0);
  const cols=['#ff7f95','#ff9fb0','#e8785b']; heartsP.forEach(h=>{ ctx.globalAlpha=clamp01(h.life/70); heart(h.x,h.y,h.s,cols[h.s%3]); ctx.globalAlpha=1; }); }
function spawnConfetti(){ confetti=[]; const cols=['#e8785b','#ffcf5c','#f5ead6','#8fd0e6','#ff9fb0'];
  for(let i=0;i<90;i++)confetti.push({x:Math.random()*W,y:-Math.random()*H,s:2+Math.random()*3,vy:1+Math.random()*2.2,vx:-1+Math.random()*2,c:cols[i%5]}); }
function drawConfetti(){ confetti.forEach(p=>{p.y+=p.vy;p.x+=p.vx;if(p.y>H){p.y=-6;p.x=Math.random()*W;} px(p.x,p.y,p.s,p.s,p.c);}); }
function caption(txt,alpha){ if(alpha<=0)return; ctx.globalAlpha=clamp01(alpha); px(0,H-30,W,30,'rgba(13,32,40,.72)'); ctx.fillStyle='#f5ead6'; ctx.font='bold 13px "Courier New", monospace'; ctx.textAlign='center'; ctx.fillText(txt,W/2,H-11); ctx.textAlign='left'; ctx.globalAlpha=1; }
function capAlpha(now,a,b,fade=500){ if(now<a||now>b)return 0; return Math.min((now-a)/fade,(b-now)/fade,1); }

/* kangaroo */
function roo(x,y){ const b='#a86a3a',d='#8a5730',dk='#7a4c28';
  px(x+5,y+1,12,3,d); px(x+14,y+2,4,2,dk); px(x-3,y+4,10,2,dk); px(x+1,y-5,4,9,d); px(x-2,y-13,9,10,b); px(x-4,y-11,4,6,b); px(x-4,y-8,2,5,d);
  px(x-7,y-21,7,8,b); px(x-7,y-25,2,4,b); px(x-4,y-25,2,4,b); px(x-6,y-19,1,1,'#222'); px(x-8,y-18,1,1,'#3a241a'); }

/* ferry */
function ferry(cx,baseY,tt){ const bob=Math.sin(tt*0.004)*1.5, fx=cx-70, fy=baseY-46+bob, w=140, h=52;
  px(fx-6,fy+h-4,w+12,8,'rgba(253,248,238,.25)'); px(fx,fy+h-16,w,16,'#16323f'); px(fx-6,fy+h-10,w+12,6,'#0f2530');
  px(fx+8,fy+6,w-16,h-20,'#f5ead6'); px(fx+8,fy+6,w-16,5,'#e6d6b6'); for(let i=0;i<5;i++) px(fx+18+i*22,fy+16,12,10,'#8fd0e6');
  px(fx+20,fy,w-40,8,'#e8785b'); px(fx+w/2-7,fy-12,14,14,'#16323f'); px(fx+w/2-7,fy-12,14,4,'#e8785b');
  // wedding bunting on the cabin
  const bc=['#e8785b','#ffcf5c','#8fd0e6','#ff9fb0']; for(let i=0;i<7;i++){ px(fx+16+i*16, fy+4, 6,4, bc[i%4]); }
  ctx.fillStyle='#16323f'; ctx.font='bold 11px "Courier New", monospace'; ctx.textAlign='center'; ctx.fillText('FERRY',cx,fy+34); ctx.textAlign='left'; }

/* ---------- guests + cars + bride & groom (arrival scene) ---------- */
function car(x,y,col){
  px(x-15,y+7,30,2,'rgba(0,0,0,.22)');
  disc(x-9,y+6,4,'#181818'); disc(x-9,y+6,2,'#666'); disc(x+9,y+6,4,'#181818'); disc(x+9,y+6,2,'#666');
  px(x-15,y-4,30,9,col); px(x-9,y-12,18,9,col); px(x-14,y-3,28,2, mix(col,'#000',.25));
  px(x-7,y-10,6,6,'#bfe3f0'); px(x+2,y-10,6,6,'#bfe3f0'); px(x+0,y-11,1,7,mix(col,'#000',.3));
  px(x+14,y-2,2,3,'#ffcf5c'); px(x-16,y-2,1,3,'#e8785b');
}
function guest(x,gy,shirt,phase,wave){
  const skin='#f2caa0', hairs=['#3a2a1a','#5a3a22','#7a5232','#c98a3f','#8a8a8a'];
  const hair=hairs[(Math.abs(Math.round(x))+shirt.length)%hairs.length];
  const step=Math.sin(phase); const l1=step>0?2:0, l2=step>0?0:2;
  px(x-3,gy-8+l1,2,8-l1,'#33333c'); px(x+1,gy-8+l2,2,8-l2,'#33333c');   // legs (walking)
  px(x-4,gy-19,8,11,shirt);                                             // body
  if(wave){ px(x+4,gy-24,2,6,shirt); px(x+4,gy-25,2,2,skin); } else { px(x+4,gy-18,2,7,shirt); }
  px(x-4,gy-8,2,7,shirt);                                               // arm
  px(x-3,gy-27,6,7,skin);                                               // head
  px(x-4,gy-29,8,3,hair); px(x-4,gy-27,1,4,hair); px(x+3,gy-27,1,4,hair);
  px(x-2,gy-25,1,1,'#333'); px(x+1,gy-25,1,1,'#333');
}
function groom(x,gy){ const skin='#f2caa0',suit='#1b1b1b',curl='#c98a3f';
  px(x-5,gy-15,4,15,suit); px(x+1,gy-15,4,15,suit); px(x-6,gy-1,5,2,'#111'); px(x+1,gy-1,5,2,'#111');
  px(x-7,gy-32,14,18,suit); px(x-2,gy-32,4,13,'#fdf8ee'); px(x-1,gy-31,2,7,'#e8785b');   // shirt + tie
  px(x-9,gy-31,2,12,suit); px(x+7,gy-31,2,12,suit);                                       // arms (right around bride)
  px(x-2,gy-34,4,2,'#e0b184'); px(x-6,gy-47,12,12,skin);
  px(x-6,gy-39,12,2,'#c98f5f'); px(x-6,gy-43,1,4,'#c98f5f'); px(x+5,gy-43,1,4,'#c98f5f');
  px(x-3,gy-43,1,2,'#3b6ea1'); px(x+2,gy-43,1,2,'#3b6ea1'); px(x-2,gy-39,3,1,'#b96b4a');
  px(x-6,gy-50,12,4,curl); px(x-7,gy-48,2,3,curl); px(x+5,gy-48,2,3,curl); px(x-3,gy-51,1,1,'#e0a95a'); px(x+2,gy-51,1,1,'#e0a95a'); }
function bride(x,gy){ const skin='#f2caa0',hair='#5a3a22',dress='#fdf8ee';
  for(let k=0;k<15;k++){ const w=7+k; px(x-(w>>1),gy-14+k,w,1,dress); }                    // skirt
  px(x-5,gy-27,10,14,dress); px(x-7,gy-26,2,10,dress); px(x+5,gy-26,2,10,dress);            // bodice + arms
  px(x-2,gy-28,4,2,'#e0b184'); px(x-5,gy-40,10,12,skin);                                    // neck + head
  px(x-8,gy-42,16,12,'rgba(253,248,238,.55)');                                             // veil behind
  px(x-6,gy-42,12,4,hair); px(x-7,gy-38,2,9,hair); px(x+5,gy-38,2,9,hair);                  // hair
  px(x-3,gy-36,1,2,'#3f7a6a'); px(x+2,gy-36,1,2,'#3f7a6a'); px(x-2,gy-32,4,1,'#c9805f');    // face
  px(x+5,gy-35,1,2,'#ffcf5c');                                                              // earring
  px(x-3,gy-16,7,4,'#4f7a3a'); px(x-2,gy-17,1,1,'#ff9fb0'); px(x+1,gy-17,1,1,'#ffcf5c'); px(x+3,gy-16,1,1,'#ff7f95'); // bouquet
}

const CARS=[ {spot:300,col:'#c0392b',delay:200}, {spot:362,col:'#2e86c1',delay:1000}, {spot:424,col:'#f1c40f',delay:1800} ];
const GUESTS=[ {from:300,shirt:'#8e44ad',gs:2300,gather:250,wave:true}, {from:362,shirt:'#16a085',gs:2900,gather:278,wave:false},
  {from:424,shirt:'#d35400',gs:3500,gather:305,wave:false}, {from:300,shirt:'#2980b9',gs:3100,gather:232,wave:true},
  {from:424,shirt:'#af7ac5',gs:4200,gather:322,wave:false} ];
function drawArrival(now){
  const p=now-S4[0], groundY=196;
  skyWater(); sun(70,52); clouds(now*0.3);
  quay(2000,groundY,now);
  ferry(340,groundY-6,now);
  // bride & groom on the quay in front of the ferry
  const bg=Math.sin(now*0.006)*1;
  groom(150,groundY+13); bride(170,groundY+13);
  // occasional celebration hearts above the couple
  if(p>800 && Math.random()<0.4) spawnHeart(160+(-8+Math.random()*24), groundY-34);
  updateHearts();
  // arriving cars
  for(const c of CARS){ if(p>c.delay){ const x=Math.max(c.spot,(W+70)-(p-c.delay)*0.28); car(x,groundY+4,c.col); } }
  // arriving guests walking toward the couple
  for(const g of GUESTS){ if(p>g.gs){ const x=Math.max(g.gather,(g.from)-(p-g.gs)*0.11); const walking=x>g.gather+0.5;
      guest(x,groundY+13,g.shirt, walking?now*0.02:0, g.wave && !walking); } }
  // light confetti near the end
  if(p>4600){ if(confetti.length===0) spawnConfetti(); drawConfetti(); }
  caption('En dat vieren we graag met jou', capAlpha(now,S4[0]+400,S4[0]+3200));
}

/* ---------- main draw ---------- */
const groundY=196;
function drawScene(now){
  ctx.clearRect(0,0,W,H);
  if(now<S2[0]){                        // S1 outback drive (UNCHANGED)
    const p=now; skyOutback(); sun(390,54); clouds(p); dunes(p,groundY);
    const kx=W+30-((p*0.09)%(W+120)); const hop=Math.abs(Math.sin(p*0.008))*14; roo(kx,groundY+8-hop);
    camper(150,groundY-2,p,true);
    caption('Ergens in de outback van Australië…', capAlpha(now,600,S2[0]-300));
  } else if(now<S3[0]){                  // S2 proposal (UNCHANGED)
    skyOutback(); sun(400,60); clouds(now*0.3); dunes(1000,groundY); camper(96,groundY-2,now,false);
    const gy=groundY+22; ilja(360,gy); jeroen(322,gy,Math.floor(now/220)%2===0);
    if(now>S2[0]+4200 && Math.random()<0.5) spawnHeart(340+(-10+Math.random()*40),gy-40); updateHearts();
    caption('Jeroen had een vraag…', capAlpha(now,S2[0]+400,S2[0]+2600));
    caption('“Wil je met me trouwen?” 💍', capAlpha(now,S2[0]+2700,S2[0]+4300));
    caption('“JA!” 🥰', capAlpha(now,S2[0]+4400,S2[1]-300));
  } else if(now<S4[0]){                  // S3 drive — now "En nu is het zover!"
    const p=now-S3[0], loc=S3[1]-S3[0], t=clamp01(p/loc);
    skyMix(t); if(t<0.6) sun(400-t*200,60); clouds(now*0.4);
    if(t<0.5) dunes(now,groundY); else quay(now,groundY,now);
    camper(150,groundY-2,now,true);
    caption('Nu is het zover: het avontuur gaat verder!', capAlpha(now,S3[0]+300,S4[0]-300));
  } else if(now<CARD){                   // S4 guests arriving ("Kom je ook?")
    drawArrival(now);
  } else {                               // save-the-date card
    skyWater(); clouds(now*0.2); quay(2000,groundY,now); ferry(340,groundY-6,now);
    groom(150,groundY+13); bride(170,groundY+13);
    drawConfetti();
    if(!cardShown){ cardShown=true; spawnConfetti(); card.classList.add('show'); }
  }
}
function loop(now){ drawScene(now-start); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
document.getElementById('replay').onclick=()=>{ card.classList.remove('show'); cardShown=false; heartsP=[]; confetti=[]; start=performance.now(); };
</script>
